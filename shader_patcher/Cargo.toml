[package]
name = "shader_patcher"
authors = ["Sergey Dzhumageldiev"]
version = "0.1.0"
edition = "2024"
build = "build.rs"
license = "MIT"

[dependencies]
thiserror = { workspace = true }
tracing = { workspace = true }
bytemuck = { workspace = true, features = ["derive"] }

winsafe = { version = "0.0.27", features = ["advapi"] }
winapi = { version = "0.3.9", features = ["memoryapi", "std"] }
ntapi = "0.4.3"

[build-dependencies]
cc = "1.2.57"
