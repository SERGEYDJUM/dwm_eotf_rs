[package]
name = "dwm_eotf_rs"
version = "0.1.0"
edition = "2024"
build = "build.rs"

[dependencies]
ntapi = { version = "0.4.3" }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["fmt"] }
winapi = { version = "0.3.9", features = ["std"] }
winsafe = { version = "0.0.27", features = ["advapi", "kernel", "psapi"] }

[build-dependencies]
winresource = "0.1.30"
